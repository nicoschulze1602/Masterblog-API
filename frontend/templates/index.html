<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container">
        <h1>📚 Blog Posts</h1>
        <div id="session-status" style="font-weight: bold; margin-bottom: 10px;"></div>
        <!-- Bereich für allgemeine Meldungen -->
        <div id="message-area" class="message-area" style="display: none;"></div>
        <div class="input-field">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="register()" id="register-btn">Register</button>
            <button onclick="login()" id="login-btn">Login</button>
            <button onclick="logout()" id="logout-btn" style="display:none;">Logout</button>
            <div id="user-info" class="user-info" style="margin-left: auto;"></div>
        </div>
        <div class="input-field">
            <input type="text" id="api-base-url" placeholder="Enter API Base URL" value="http://127.0.0.1:5002/api">
            <button onclick="loadPosts()">Load Posts</button>
        </div>
        <div class="input-field">
            <input type="text" id="search-title" placeholder="Search by Title">
            <input type="text" id="search-content" placeholder="Search by Content">
            <select id="sort-field">
                <option value="">Sort By</option>
                <option value="title">Title</option>
                <option value="content">Content</option>
            </select>
            <select id="sort-direction">
                <option value="asc">Asc</option>
                <option value="desc">Desc</option>
            </select>
            <button onclick="loadPosts()">Apply</button>
        </div>
        <div class="input-field">
            <input type="text" id="post-title" placeholder="Enter Post Title">
            <div id="title-warning" class="warning" style="display:none;">Title cannot be empty.</div>
            <input type="text" id="post-content" placeholder="Enter Post Content">
            <div id="content-warning" class="warning" style="display:none;">Content cannot be empty.</div>
            <button onclick="addPost()">Add Post</button>
        </div>
        </div>
        <div id="post-container">
            <!-- Blog posts will be inserted here by JavaScript -->
        </div>
    </div>

    <script src="static/main.js"></script>
</body>
</html>
